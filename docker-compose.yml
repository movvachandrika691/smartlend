version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartlend-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-smartlend}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlend-network

  redis:
    image: redis:7-alpine
    container_name: smartlend-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlend-network

  smartlend-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartlend-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smartlend}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      JWT_PRIVATE_KEY: /app/keys/private_key.pem
      JWT_PUBLIC_KEY: /app/keys/public_key.pem
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped
    networks:
      - smartlend-network

volumes:
  postgres_data:
  redis_data:

networks:
  smartlend-network:
    driver: bridge